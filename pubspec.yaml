name: loanscope
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  glassmorphism: ^3.0.0
  flutter_vector_icons: ^2.0.0
  csv: ^6.0.0
  latlong2: ^0.9.1
  animate_do: ^3.3.8
  fl_chart: ^0.70.2
  flutter_map: ^7.0.2
  flutter_map_location_marker: ^9.0.0
  geolocator: ^13.0.2
  google_fonts: ^8.0.2
  http: ^1.3.0
  shared_preferences: ^2.5.1
  syncfusion_flutter_gauges: ^28.2.4
  url_launcher: ^6.3.1
  card_swiper: ^3.0.1
  flutter_map_cancellable_tile_provider: ^3.0.2
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/banks/
    - assets/images/banks/logo.png
    - backend/cibil_data.csv
    - assets/cibil_data.csv
